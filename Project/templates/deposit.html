{% extends "base.html" %}
{% block title %}Deposit – Stock Trading System{% endblock %}

{% block content %}
<div class="card shadow-sm">
    <div class="card-body p-4">

        <h5 class="mb-1">Deposit Funds</h5>
        <p class="text-muted small mb-1">Add cash to your trading account.</p>
        <p class="mb-4">
            Current balance:
            <strong>${{ "%.2f"|format(current_user.availableFunds) }}</strong>
        </p>

        {% if error %}
            <div class="alert alert-danger py-2">{{ error }}</div>
        {% endif %}

        <form method="POST" action="{{ url_for('deposit') }}">
            <div class="mb-3">
                <label for="amount" class="form-label">Amount (USD)</label>
                <div class="input-group" style="max-width: 300px;">
                    <span class="input-group-text">$</span>
                    <input type="number"
                           class="form-control"
                           id="amount"
                           name="amount"
                           min="0.01"
                           step="0.01"
                           placeholder="0.00"
                           value="{{ request.form.get('amount', '') }}"
                           required
                           autofocus>
                </div>
            </div>

            <button type="submit" class="btn btn-primary">Deposit</button>
        </form>

    </div>
</div>
{% endblock %}
