<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account – Stock Trading System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light d-flex align-items-center justify-content-center min-vh-100">

<div class="card shadow-sm" style="width: 420px;">
    <div class="card-body p-4">

        <h5 class="text-center fw-bold mb-3">Stock Trading System</h5>

        <ul class="nav border-bottom mb-3 pb-2">
            <li class="nav-item">
                <a class="nav-link ps-0" href="{{ url_for('login') }}">Login</a>
            </li>
            <li class="nav-item">
                <a class="nav-link active" href="{{ url_for('register') }}">Create account</a>
            </li>
        </ul>

        <h6 class="mb-3">Create an account</h6>

        {% if error %}
            <div class="alert alert-danger py-2">{{ error }}</div>
        {% endif %}

        <form method="POST" action="{{ url_for('register') }}" id="signupForm">
            <div class="mb-3">
                <label for="fullname" class="form-label">Full Name <span class="text-danger">*</span></label>
                <input type="text" class="form-control" id="fullname" name="fullname"
                       value="{{ request.form.get('fullname', '') }}" required autofocus>
            </div>
            <div class="mb-3">
                <label for="email" class="form-label">Email <span class="text-danger">*</span></label>
                <input type="email" class="form-control" id="email" name="email"
                       value="{{ request.form.get('email', '') }}" required>
            </div>
            <div class="mb-3">
                <label for="username" class="form-label">Username <span class="text-danger">*</span></label>
                <input type="text" class="form-control" id="username" name="username"
                       value="{{ request.form.get('username', '') }}" required>
            </div>
            <div class="mb-3">
                <label for="password" class="form-label">Password <span class="text-danger">*</span></label>
                <input type="password" class="form-control" id="password" name="password" required>
            </div>
            <div class="mb-4">
                <label for="confirm_password" class="form-label">Confirm Password <span class="text-danger">*</span></label>
                <input type="password" class="form-control" id="confirm_password" name="confirm_password" required>
                <div class="invalid-feedback">Passwords do not match.</div>
            </div>
            <div class="d-flex gap-2">
                <button type="submit" class="btn btn-primary">Create Account</button>
                <a href="{{ url_for('login') }}" class="btn btn-secondary">Cancel</a>
            </div>
        </form>

    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    const form    = document.getElementById('signupForm');
    const pwd     = document.getElementById('password');
    const confirm = document.getElementById('confirm_password');

    form.addEventListener('submit', function(e) {
        if (pwd.value !== confirm.value) {
            e.preventDefault();
            confirm.classList.add('is-invalid');
        }
    });

    confirm.addEventListener('input', function() {
        if (confirm.value === '') {
            confirm.classList.remove('is-invalid', 'is-valid');
        } else if (pwd.value !== confirm.value) {
            confirm.classList.add('is-invalid');
            confirm.classList.remove('is-valid');
        } else {
            confirm.classList.remove('is-invalid');
            confirm.classList.add('is-valid');
        }
    });
</script>
</body>
</html>
